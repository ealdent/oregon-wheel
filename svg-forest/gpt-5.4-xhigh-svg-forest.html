<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <title>Glasswood Drift</title>
  <style>
    :root {
      --bg-deep: #051019;
      --bg-mid: #0d3345;
      --bg-glow: #f2ba6a;
      --ui-ink: rgba(245, 250, 239, 0.92);
      --ui-faint: rgba(245, 250, 239, 0.54);
      --ui-panel: rgba(4, 18, 28, 0.35);
      --ui-ring: rgba(205, 247, 231, 0.18);
      --joy-size: min(30vw, 11rem);
      --safe-bottom: max(1rem, env(safe-area-inset-bottom));
      --safe-left: max(1rem, env(safe-area-inset-left));
      --safe-right: max(1rem, env(safe-area-inset-right));
      --safe-top: max(1rem, env(safe-area-inset-top));
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      overscroll-behavior: none;
      touch-action: none;
    }

    body {
      position: fixed;
      inset: 0;
      color: var(--ui-ink);
      font-family: "Avenir Next Condensed", "Gill Sans", "Trebuchet MS", sans-serif;
      user-select: none;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 68% 28%, rgba(255, 201, 114, 0.16), transparent 28%),
        linear-gradient(180deg, var(--bg-mid), var(--bg-deep));
      touch-action: none;
    }

    #scene {
      display: block;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
    }

    #app.dragging #scene {
      cursor: grabbing;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .hud {
      position: absolute;
      top: var(--safe-top);
      left: var(--safe-left);
      max-width: min(26rem, 72vw);
      padding: 0.85rem 1rem;
      border: 1px solid var(--ui-ring);
      border-radius: 1rem;
      background: linear-gradient(180deg, rgba(2, 14, 24, 0.48), rgba(2, 14, 24, 0.24));
      backdrop-filter: blur(12px);
      box-shadow: 0 0.75rem 2.5rem rgba(0, 0, 0, 0.18);
    }

    .title {
      margin: 0;
      font-size: clamp(1rem, 2vw, 1.35rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 0.3rem 0 0;
      color: var(--ui-faint);
      font-size: clamp(0.72rem, 1.4vw, 0.88rem);
      line-height: 1.35;
      letter-spacing: 0.05em;
    }

    .status {
      position: absolute;
      top: calc(var(--safe-top) + 6.35rem);
      left: var(--safe-left);
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      border: 1px solid rgba(218, 255, 246, 0.12);
      background: rgba(5, 16, 25, 0.28);
      color: rgba(236, 248, 233, 0.78);
      font-size: clamp(0.7rem, 1.4vw, 0.82rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }

    .reticle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 1.45rem;
      height: 1.45rem;
      margin-left: -0.725rem;
      margin-top: -0.725rem;
      border-radius: 50%;
      border: 1px solid rgba(233, 250, 233, 0.3);
      box-shadow:
        0 0 0 0.35rem rgba(174, 255, 224, 0.05),
        inset 0 0 1.25rem rgba(255, 246, 215, 0.08);
      opacity: 0.8;
    }

    .reticle::before,
    .reticle::after {
      content: "";
      position: absolute;
      background: rgba(233, 250, 233, 0.35);
    }

    .reticle::before {
      left: 50%;
      top: 0.2rem;
      bottom: 0.2rem;
      width: 1px;
      transform: translateX(-50%);
    }

    .reticle::after {
      top: 50%;
      left: 0.2rem;
      right: 0.2rem;
      height: 1px;
      transform: translateY(-50%);
    }

    .joystick {
      position: absolute;
      bottom: calc(var(--safe-bottom) + 0.45rem);
      width: var(--joy-size);
      height: var(--joy-size);
      border-radius: 50%;
      pointer-events: auto;
      touch-action: none;
      background:
        radial-gradient(circle at 50% 50%, rgba(247, 252, 234, 0.08) 0 24%, transparent 24% 100%),
        radial-gradient(circle at 50% 50%, rgba(12, 40, 49, 0.48) 0 62%, rgba(5, 18, 28, 0.18) 62% 100%);
      border: 1px solid rgba(210, 249, 228, 0.18);
      box-shadow:
        0 1rem 2rem rgba(0, 0, 0, 0.26),
        inset 0 0 0 1px rgba(255, 245, 214, 0.04);
      overflow: hidden;
    }

    .joystick::before,
    .joystick::after {
      content: "";
      position: absolute;
      inset: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
    }

    .joystick::before {
      width: 62%;
      height: 62%;
      border: 1px dashed rgba(226, 248, 239, 0.18);
    }

    .joystick::after {
      width: 18%;
      height: 18%;
      background: rgba(237, 246, 223, 0.06);
      box-shadow: 0 0 0 0.3rem rgba(170, 255, 228, 0.04);
    }

    .joystick.left {
      left: var(--safe-left);
    }

    .joystick.right {
      right: var(--safe-right);
    }

    .joystick.active {
      border-color: rgba(238, 249, 213, 0.35);
      box-shadow:
        0 1rem 2rem rgba(0, 0, 0, 0.32),
        inset 0 0 0 1px rgba(255, 249, 217, 0.08),
        0 0 2.2rem rgba(126, 238, 213, 0.12);
    }

    .joystick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 34%;
      height: 34%;
      margin-left: -17%;
      margin-top: -17%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 32%, rgba(255, 255, 235, 0.56), rgba(255, 255, 235, 0.08) 38%, transparent 40%),
        linear-gradient(180deg, rgba(244, 216, 133, 0.88), rgba(102, 233, 210, 0.72));
      box-shadow:
        inset 0 -0.35rem 0.65rem rgba(0, 0, 0, 0.14),
        0 0.45rem 0.9rem rgba(0, 0, 0, 0.28);
      transition: transform 40ms linear;
      will-change: transform;
      pointer-events: none;
    }

    .joystick-label {
      position: absolute;
      left: 50%;
      bottom: 0.9rem;
      transform: translateX(-50%);
      color: rgba(237, 246, 223, 0.74);
      font-size: clamp(0.68rem, 1.8vw, 0.86rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .axis-note {
      position: absolute;
      color: rgba(237, 246, 223, 0.48);
      font-size: clamp(0.62rem, 1.3vw, 0.76rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .axis-note.vertical {
      left: 50%;
      top: 0.85rem;
      transform: translateX(-50%);
    }

    .axis-note.horizontal {
      left: 50%;
      top: 0.85rem;
      transform: translateX(-50%);
    }

    @media (pointer: fine) {
      .joystick {
        opacity: 0.42;
      }
    }

    @media (max-width: 700px) {
      .hud {
        max-width: min(20rem, 80vw);
        padding: 0.7rem 0.82rem;
      }

      .status {
        top: calc(var(--safe-top) + 5.55rem);
      }
    }

    @media (max-height: 560px) {
      .hud {
        padding: 0.6rem 0.8rem;
      }

      .subtitle {
        display: none;
      }

      .status {
        top: calc(var(--safe-top) + 3.5rem);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <svg id="scene" aria-label="Glasswood Drift first-person exploration scene" role="img">
      <defs>
        <linearGradient id="skyGradient" x1="0" y1="0" x2="0" y2="1">

        <symbol id="prop-prism-tree" viewBox="-80 -180 160 196" overflow="visible">

              d="M -10 0 C -12 -20 -9 -42 -7 -68 C -4 -98 -3 -126 0 -156 C 3 -126 4 -98 7 -68 C 9 -42 12 -20 10 0 Z"

            <path d="M -64 -118 L -28 -96 L -43 -72 Z" fill="url(#crystalGradientB)" opacity="0.82" />
            <path d="M 64 -118 L 28 -96 L 43 -72 Z" fill="url(#crystalGradientB)" opacity="0.82" />
            <path d="M -18 -100 L -3 -132 L 9 -98 Z" fill="#f9ffd7" opacity="0.3" />
            <circle cx="-21" cy="-104" r="5.2" fill="url(#orbGradient)" opacity="0.92" />

            <path d="M 11 -76 C 32 -82 44 -99 44 -121 C 20 -117 10 -101 11 -76 Z" fill="url(#leafGradient)" opacity="0.84" />
            <path d="M 3 -26 C 14 -42 20 -58 22 -78" fill="none" stroke="rgba(254,248,217,0.3)" stroke-width="2.8" />
            <g transform="translate(31 -152)">
              <ellipse rx="14" ry="28" fill="url(#petalGradient)" transform="rotate(-62)" opacity="0.95" />
              <ellipse rx="13" ry="26" fill="url(#petalGradient)" transform="rotate(-18)" opacity="0.92" />
              <ellipse rx="13" ry="26" fill="url(#petalGradient)" transform="rotate(24)" opacity="0.92" />
              <ellipse rx="14" ry="28" fill="url(#petalGradient)" transform="rotate(64)" opacity="0.95" />

              <circle cx="4" cy="-36" r="8" fill="url(#orbGradient)" opacity="0.92" />
            </g>

        </symbol>

        <symbol id="prop-ribbon-arch" viewBox="-122 -172 244 198" overflow="visible">
          <g>
            <path
              d="M -66 0 C -63 -52 -43 -102 -6 -140"
              fill="none"
              stroke="url(#archGradient)"
              stroke-width="12"
              stroke-linecap="round"
            />
            <path
              d="M 66 0 C 63 -52 43 -102 6 -140"

              stroke-linecap="round"
            />
            <path d="M -6 -140 C -1 -148 1 -148 6 -140" fill="none" stroke="url(#archGradient)" stroke-width="12" stroke-linecap="round" />
            <path d="M -40 -64 C -17 -96 18 -104 42 -82" fill="none" stroke="rgba(255,247,194,0.42)" stroke-width="4" stroke-linecap="round" />
            <path d="M -8 -140 C -20 -110 -21 -84 -14 -52" fill="none" stroke="url(#ribbonGradient)" stroke-width="4.8" stroke-linecap="round" />
            <path d="M 8 -140 C 20 -112 21 -84 14 -46" fill="none" stroke="url(#ribbonGradient)" stroke-width="4.8" stroke-linecap="round" />
            <circle cx="0" cy="-140" r="8" fill="url(#orbGradient)" opacity="0.88" />

            <path d="M 0 8 C 7 -14 11 -37 0 -80 C -11 -37 -7 -14 0 8 Z" fill="url(#tailGradient)" opacity="0.92" />
            <circle cx="0" cy="-31" r="8" fill="url(#orbGradient)" opacity="0.94" />
            <path d="M -29 -18 C -10 -26 10 -26 29 -18" fill="none" stroke="rgba(7,19,29,0.36)" stroke-width="4" stroke-linecap="round" />

      </defs>

      <g id="sceneRig">
        <g id="skyLayer">
          <rect id="skyRect" x="0" y="0" fill="url(#skyGradient)"></rect>
          <circle id="sunGlow" fill="url(#sunGradient)" opacity="0.9"></circle>
          <g id="skyParallax"></g>
          <path id="distantRidge" fill="rgba(10, 33, 44, 0.2)"></path>
        </g>

        <g id="groundLayer">
          <path id="groundShape" fill="url(#groundGradient)"></path>
          <ellipse id="horizonMist" fill="url(#mistGradient)" opacity="0.82"></ellipse>
          <g id="groundBands"></g>
        </g>

        <g id="spriteLayer"></g>

      <rect id="vignette" x="0" y="0" fill="url(#vignetteGradient)" pointer-events="none"></rect>
    </svg>

    <div class="overlay">
      <div class="hud">
        <p class="title">Glasswood Drift</p>
        <p class="subtitle">A procedural aurora forest of prism pines, lantern blooms, ribbon arches, and drifting sky-kites.</p>
      </div>
      <div class="status" id="statusText">WASD or arrows to move. Drag to look. Dual sticks on touch.</div>
      <div class="reticle" aria-hidden="true"></div>

      <div class="joystick left" id="leftJoystick">
        <div class="axis-note vertical">Thrust</div>
        <div class="joystick-knob"></div>
        <div class="joystick-label">Walk</div>
      </div>

      <div class="joystick right" id="rightJoystick">
        <div class="axis-note horizontal">Turn</div>
        <div class="joystick-knob"></div>
        <div class="joystick-label">Look</div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const NS = "http://www.w3.org/2000/svg";

      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const mix = (a, b, t) => a + (b - a) * t;
      const smooth = (current, target, amount) => current + (target - current) * amount;

      const hash = (x, z) => {
        const value = Math.sin(x * 127.1 + z * 311.7) * 43758.5453123;
        return value - Math.floor(value);
      };

      const scene = document.getElementById("scene");
      const app = document.getElementById("app");
      const sceneRig = document.getElementById("sceneRig");
      const skyRect = document.getElementById("skyRect");
      const sunGlow = document.getElementById("sunGlow");
      const skyParallax = document.getElementById("skyParallax");
      const distantRidge = document.getElementById("distantRidge");
      const groundShape = document.getElementById("groundShape");
      const horizonMist = document.getElementById("horizonMist");
      const groundBands = document.getElementById("groundBands");
      const spriteLayer = document.getElementById("spriteLayer");
      const vignette = document.getElementById("vignette");
      const statusText = document.getElementById("statusText");
      const leftJoystick = document.getElementById("leftJoystick");
      const rightJoystick = document.getElementById("rightJoystick");

      const CONFIG = {
        cellSize: 18,
        renderDistance: 230,
        maxSprites: 220,
        cameraHeight: 1.72,
        fov: Math.PI / 2.9,
        walkSpeed: 27,
        turnSpeed: 1.75,
        nearClip: 0.8
      };

      const SPRITES = {
        tree: { id: "#prop-prism-tree", size: 1.7, sway: 1.6, swaySpeed: 0.9, shadowRx: 22, shadowRy: 6.5 },
        bloom: { id: "#prop-lantern-bloom", size: 1.22, sway: 2.8, swaySpeed: 1.4, shadowRx: 16, shadowRy: 5.2 },
        arch: { id: "#prop-ribbon-arch", size: 1.9, sway: 1.2, swaySpeed: 0.7, shadowRx: 28, shadowRy: 7.2 },
        glider: { id: "#prop-sky-glider", size: 1.4, sway: 5.2, swaySpeed: 1.1, shadowRx: 0, shadowRy: 0 }
      };

      const state = {
        width: window.innerWidth,
        height: window.innerHeight,
        centerX: window.innerWidth * 0.5,
        centerY: window.innerHeight * 0.5,
        horizonY: window.innerHeight * 0.38,
        focal: 700,
        time: 0,
        lastFrame: 0,
        lastStatusBucket: -1,
        lastPruneBucket: -1,
        player: {
          x: 0,
          z: 0,
          angle: 0,
          speed: 0,
          bob: 0,
          bobStrength: 0,
          headingDisplay: 0
        },
        input: {
          keyboardMove: 0,
          keyboardTurn: 0,
          joystickMove: 0,
          joystickTurn: 0
        }
      };

      const cache = new Map();
      const groundBandEls = [];
      const skyEls = [];
      const spritePool = [];
      const keys = new Set();

      const makeSvg = (tag, attrs = {}) => {
        const node = document.createElementNS(NS, tag);
        Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
        return node;
      };

      function getCell(cx, cz) {
        const key = `${cx},${cz}`;
        if (cache.has(key)) {
          return cache.get(key);
        }

        const props = [];
        const density = hash(cx, cz);

        if (density > 0.16) {
          const count = density > 0.82 ? 2 : 1;

          for (let i = 0; i < count; i += 1) {
            const slot = hash(cx * 3 + i * 17, cz * 5 - i * 11);
            const offsetX = (hash(cx * 19 + i * 23, cz * 29 + i * 7) - 0.5) * CONFIG.cellSize * 0.86;
            const offsetZ = (hash(cx * 37 + i * 13, cz * 41 - i * 5) - 0.5) * CONFIG.cellSize * 0.86;
            const typeRoll = hash(cx * 71 + i * 19, cz * 53 + i * 3);

            let type = "tree";
            if (typeRoll > 0.48 && typeRoll <= 0.77) type = "bloom";
            if (typeRoll > 0.77 && typeRoll <= 0.93) type = "arch";
            if (typeRoll > 0.93) type = "glider";

            props.push({
              type,
              x: cx * CONFIG.cellSize + offsetX,
              z: cz * CONFIG.cellSize + offsetZ,
              scale: type === "tree" ? 0.9 + slot * 0.85 : type === "bloom" ? 0.8 + slot * 0.55 : type === "arch" ? 0.85 + slot * 0.75 : 0.82 + slot * 0.6,
              flip: slot > 0.5 ? -1 : 1,
              phase: hash(cx * 97 + i * 7, cz * 89 - i * 11) * Math.PI * 2
            });
          }
        }

        cache.set(key, props);
        return props;
      }

      function pruneCache(playerCellX, playerCellZ) {
        const limit = 28;
        for (const key of cache.keys()) {
          const [cx, cz] = key.split(",").map(Number);
          if (Math.abs(cx - playerCellX) > limit || Math.abs(cz - playerCellZ) > limit) {
            cache.delete(key);
          }
        }
      }

      function buildBackground() {
        skyParallax.innerHTML = "";
        groundBands.innerHTML = "";
        groundBandEls.length = 0;
        skyEls.length = 0;

        const ribbonColors = [
          "rgba(139, 255, 224, 0.2)",
          "rgba(255, 241, 184, 0.16)",
          "rgba(104, 221, 255, 0.18)"
        ];

        for (let i = 0; i < 4; i += 1) {
          const path = makeSvg("path", {
            fill: "none",
            "stroke-linecap": "round",
            "stroke-linejoin": "round",
            "stroke-width": (10 + i * 4).toString(),
            opacity: (0.52 - i * 0.08).toFixed(2),
            stroke: ribbonColors[i % ribbonColors.length]
          });
          skyParallax.appendChild(path);
          skyEls.push(path);
        }

        for (let i = 0; i < 3; i += 1) {
          const ellipse = makeSvg("ellipse", {
            fill: i === 0 ? "rgba(245, 248, 218, 0.05)" : "rgba(113, 232, 218, 0.045)",
            stroke: i === 1 ? "rgba(241, 246, 213, 0.09)" : "rgba(128, 237, 224, 0.08)",
            "stroke-width": "2"
          });
          skyParallax.appendChild(ellipse);
          skyEls.push(ellipse);
        }

        for (let i = 0; i < 18; i += 1) {
          const band = makeSvg("path", {
            opacity: (0.12 + i * 0.018).toFixed(2),
            fill: i % 2 === 0 ? "rgba(230, 244, 196, 0.08)" : "rgba(105, 214, 210, 0.05)"
          });
          groundBands.appendChild(band);
          groundBandEls.push(band);
        }

        for (let i = 0; i < 10; i += 1) {
          const shard = makeSvg("path", {
            fill: i % 2 === 0 ? "rgba(246, 248, 222, 0.07)" : "rgba(123, 236, 220, 0.06)",
            opacity: "0.7"
          });
          groundBands.appendChild(shard);
          groundBandEls.push(shard);
        }
      }

      function buildSpritePool() {
        for (let i = 0; i < CONFIG.maxSprites; i += 1) {
          const group = makeSvg("g", { opacity: "0", "pointer-events": "none" });
          const shadow = makeSvg("ellipse", {
            fill: "rgba(2, 12, 18, 0.18)"
          });
          const body = makeSvg("g");
          const use = makeSvg("use");

          body.appendChild(use);
          group.appendChild(shadow);
          group.appendChild(body);
          spriteLayer.appendChild(group);

          spritePool.push({ group, shadow, body, use });
        }
      }

      function resize() {
        state.width = window.innerWidth;
        state.height = window.innerHeight;
        state.centerX = state.width * 0.5;
        state.centerY = state.height * 0.5;
        state.horizonY = state.height * 0.38;
        state.focal = Math.min(state.width, state.height * 1.35) / (2 * Math.tan(CONFIG.fov / 2));

        scene.setAttribute("viewBox", `0 0 ${state.width} ${state.height}`);
        skyRect.setAttribute("width", state.width);
        skyRect.setAttribute("height", state.height);
        vignette.setAttribute("width", state.width);
        vignette.setAttribute("height", state.height);

        sunGlow.setAttribute("cx", (state.width * 0.76).toFixed(2));
        sunGlow.setAttribute("cy", (state.height * 0.21).toFixed(2));
        sunGlow.setAttribute("r", Math.max(state.width, state.height) * 0.22);

        const ridgeTop = state.horizonY + state.height * 0.06;
        distantRidge.setAttribute(
          "d",
          [
            `M 0 ${ridgeTop}`,
            `C ${state.width * 0.12} ${ridgeTop - state.height * 0.035}, ${state.width * 0.22} ${ridgeTop + state.height * 0.018}, ${state.width * 0.34} ${ridgeTop - state.height * 0.03}`,
            `S ${state.width * 0.58} ${ridgeTop + state.height * 0.026}, ${state.width * 0.72} ${ridgeTop - state.height * 0.022}`,
            `S ${state.width * 0.92} ${ridgeTop + state.height * 0.022}, ${state.width} ${ridgeTop - state.height * 0.014}`,
            `L ${state.width} ${state.height}`,
            `L 0 ${state.height}`,
            "Z"
          ].join(" ")
        );

        groundShape.setAttribute(
          "d",
          `M 0 ${state.horizonY} L ${state.width} ${state.horizonY} L ${state.width} ${state.height} L 0 ${state.height} Z`
        );
        horizonMist.setAttribute("cx", state.centerX);
        horizonMist.setAttribute("cy", state.horizonY + state.height * 0.02);
        horizonMist.setAttribute("rx", state.width * 0.52);
        horizonMist.setAttribute("ry", state.height * 0.14);

        for (let i = 0; i < 18; i += 1) {
          const t1 = i / 18;
          const t2 = (i + 1) / 18;
          const z1 = 4 * Math.pow(CONFIG.renderDistance / 4, t1);
          const z2 = 4 * Math.pow(CONFIG.renderDistance / 4, t2);
          const y1 = state.horizonY + (CONFIG.cameraHeight * state.focal) / z1;
          const y2 = state.horizonY + (CONFIG.cameraHeight * state.focal) / z2;
          const x1 = (state.focal * 62) / z1;
          const x2 = (state.focal * 62) / z2;
          groundBandEls[i].setAttribute(
            "d",
            `M ${state.centerX - x1} ${y1} L ${state.centerX + x1} ${y1} L ${state.centerX + x2} ${y2} L ${state.centerX - x2} ${y2} Z`
          );
        }

        for (let i = 0; i < 10; i += 1) {
          const slot = groundBandEls[18 + i];
          const x = mix(state.width * 0.08, state.width * 0.92, i / 9);
          const width = mix(state.width * 0.012, state.width * 0.03, i / 9);
          const y = mix(state.horizonY + state.height * 0.1, state.height * 0.96, i / 9);
          slot.setAttribute(
            "d",
            `M ${x - width * 0.5} ${y} L ${x + width * 0.5} ${y} L ${x} ${y - width * 2.6} Z`
          );
        }

        const ribbonBaseY = state.height * 0.17;
        const ribbonAmp = state.height * 0.045;
        const ribbonSpan = state.width * 2.8;

        for (let i = 0; i < 4; i += 1) {
          const y = ribbonBaseY + i * state.height * 0.085;
          const amp = ribbonAmp + i * state.height * 0.012;
          skyEls[i].setAttribute(
            "d",
            [
              `M ${-state.width * 1.1} ${y}`,
              `C ${-state.width * 0.6} ${y - amp}, ${-state.width * 0.15} ${y + amp}, ${state.width * 0.28} ${y - amp * 0.42}`,
              `S ${state.width * 1.1} ${y + amp * 0.95}, ${ribbonSpan} ${y - amp * 0.28}`
            ].join(" ")
          );
        }

        skyEls[4].setAttribute("cx", state.width * 0.24);
        skyEls[4].setAttribute("cy", state.height * 0.16);
        skyEls[4].setAttribute("rx", state.width * 0.16);
        skyEls[4].setAttribute("ry", state.height * 0.08);

        skyEls[5].setAttribute("cx", state.width * 0.92);
        skyEls[5].setAttribute("cy", state.height * 0.28);
        skyEls[5].setAttribute("rx", state.width * 0.12);
        skyEls[5].setAttribute("ry", state.height * 0.06);

        skyEls[6].setAttribute("cx", state.width * 1.56);
        skyEls[6].setAttribute("cy", state.height * 0.18);
        skyEls[6].setAttribute("rx", state.width * 0.22);
        skyEls[6].setAttribute("ry", state.height * 0.1);
      }

      function updateKeyboardAxes() {
        const move = (keys.has("KeyW") || keys.has("ArrowUp") ? 1 : 0) - (keys.has("KeyS") || keys.has("ArrowDown") ? 1 : 0);
        const turn = (keys.has("KeyD") || keys.has("ArrowRight") ? 1 : 0) - (keys.has("KeyA") || keys.has("ArrowLeft") ? 1 : 0);
        state.input.keyboardMove = clamp(move, -1, 1);
        state.input.keyboardTurn = clamp(turn, -1, 1);
      }

      function attachJoystick(root, axis) {
        const knob = root.querySelector(".joystick-knob");
        const joyState = {
          pointerId: null,
          x: 0,
          y: 0
        };

        const release = () => {
          joyState.pointerId = null;
          joyState.x = 0;
          joyState.y = 0;
          knob.style.transform = "translate(0px, 0px)";
          root.classList.remove("active");
          if (axis === "move") state.input.joystickMove = 0;
          if (axis === "turn") state.input.joystickTurn = 0;
        };

        const update = (event) => {
          const rect = root.getBoundingClientRect();
          const centerX = rect.left + rect.width * 0.5;
          const centerY = rect.top + rect.height * 0.5;
          let dx = event.clientX - centerX;
          let dy = event.clientY - centerY;
          const limit = rect.width * 0.27;
          const distance = Math.hypot(dx, dy) || 1;

          if (distance > limit) {
            dx = (dx / distance) * limit;
            dy = (dy / distance) * limit;
          }

          joyState.x = dx;
          joyState.y = dy;
          knob.style.transform = `translate(${dx}px, ${dy}px)`;

          if (axis === "move") {
            state.input.joystickMove = clamp(-dy / limit, -1, 1);
          }

          if (axis === "turn") {
            state.input.joystickTurn = clamp(dx / limit, -1, 1);
          }
        };

        root.addEventListener("pointerdown", (event) => {
          if (joyState.pointerId !== null) return;
          joyState.pointerId = event.pointerId;
          root.classList.add("active");
          root.setPointerCapture(event.pointerId);
          update(event);
          event.preventDefault();
        });

        root.addEventListener("pointermove", (event) => {
          if (event.pointerId !== joyState.pointerId) return;
          update(event);
          event.preventDefault();
        });

        const end = (event) => {
          if (event.pointerId !== joyState.pointerId) return;
          release();
          event.preventDefault();
        };

        root.addEventListener("pointerup", end);
        root.addEventListener("pointercancel", end);
        root.addEventListener("lostpointercapture", release);
      }

      function installInput() {
        window.addEventListener("keydown", (event) => {
          if (["KeyW", "KeyA", "KeyS", "KeyD", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(event.code)) {
            keys.add(event.code);
            updateKeyboardAxes();
            event.preventDefault();
          }
        }, { passive: false });

        window.addEventListener("keyup", (event) => {
          if (keys.delete(event.code)) {
            updateKeyboardAxes();
            event.preventDefault();
          }
        }, { passive: false });

        let dragPointerId = null;
        let lastDragX = 0;

        app.addEventListener("pointerdown", (event) => {
          if (event.pointerType !== "mouse") return;
          if (event.target.closest(".joystick")) return;
          dragPointerId = event.pointerId;
          lastDragX = event.clientX;
          app.classList.add("dragging");
          event.preventDefault();
        });

        window.addEventListener("pointermove", (event) => {
          if (event.pointerId !== dragPointerId) return;
          const deltaX = event.clientX - lastDragX;
          lastDragX = event.clientX;
          state.player.angle += deltaX * 0.0054;
          event.preventDefault();
        }, { passive: false });

        const stopDragging = (event) => {
          if (event.pointerId !== dragPointerId) return;
          dragPointerId = null;
          app.classList.remove("dragging");
          event.preventDefault();
        };

        window.addEventListener("pointerup", stopDragging, { passive: false });
        window.addEventListener("pointercancel", stopDragging, { passive: false });

        attachJoystick(leftJoystick, "move");
        attachJoystick(rightJoystick, "turn");

        const preventGesture = (event) => event.preventDefault();
        ["gesturestart", "gesturechange", "gestureend"].forEach((type) => {
          document.addEventListener(type, preventGesture, { passive: false });
        });

        ["touchstart", "touchmove"].forEach((type) => {
          app.addEventListener(type, preventGesture, { passive: false });
        });

        window.addEventListener("wheel", (event) => {
          if (event.ctrlKey) {
            event.preventDefault();
          }
        }, { passive: false });
      }

      function update(dt, now) {
        state.time = now;

        const moveInput = clamp(state.input.keyboardMove + state.input.joystickMove, -1, 1);
        const turnInput = clamp(state.input.keyboardTurn + state.input.joystickTurn, -1, 1);
        const desiredSpeed = moveInput * CONFIG.walkSpeed;

        state.player.speed = smooth(state.player.speed, desiredSpeed, clamp(dt * 6.5, 0, 1));
        state.player.angle += turnInput * CONFIG.turnSpeed * dt;
        state.player.x += Math.sin(state.player.angle) * state.player.speed * dt;
        state.player.z += Math.cos(state.player.angle) * state.player.speed * dt;

        const motion = clamp(Math.abs(state.player.speed) / CONFIG.walkSpeed, 0, 1);
        state.player.bobStrength = smooth(state.player.bobStrength, motion, clamp(dt * 7, 0, 1));
        state.player.bob += dt * (5 + 8 * motion);

        const heading = ((state.player.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
        state.player.headingDisplay = heading;
      }

      function render() {
        const bobStrength = state.player.bobStrength;
        const bobY = Math.sin(state.player.bob * 1.08) * state.height * 0.009 * bobStrength;
        const bobX = Math.cos(state.player.bob * 0.54) * state.width * 0.005 * bobStrength;
        const roll = Math.sin(state.player.bob * 0.54) * 1.3 * bobStrength;

        sceneRig.setAttribute(
          "transform",
          `translate(${bobX.toFixed(2)} ${bobY.toFixed(2)}) rotate(${roll.toFixed(3)} ${state.centerX.toFixed(2)} ${state.centerY.toFixed(2)})`
        );

        const parallaxWidth = state.width * 1.6;
        const parallaxX = (((state.player.angle * state.width * 0.14) % parallaxWidth) + parallaxWidth) % parallaxWidth;
        const parallaxY = Math.sin(state.time * 0.00012) * state.height * 0.006;
        skyParallax.setAttribute("transform", `translate(${-parallaxX.toFixed(2)} ${parallaxY.toFixed(2)})`);

        const cosA = Math.cos(state.player.angle);
        const sinA = Math.sin(state.player.angle);
        const playerCellX = Math.floor(state.player.x / CONFIG.cellSize);
        const playerCellZ = Math.floor(state.player.z / CONFIG.cellSize);
        const cellRadius = Math.ceil(CONFIG.renderDistance / CONFIG.cellSize);
        const frustum = Math.tan(CONFIG.fov * 0.62);
        const visible = [];

        for (let cz = playerCellZ - cellRadius; cz <= playerCellZ + cellRadius; cz += 1) {
          for (let cx = playerCellX - cellRadius; cx <= playerCellX + cellRadius; cx += 1) {
            const props = getCell(cx, cz);
            if (!props.length) continue;

            for (const prop of props) {
              let dx = prop.x - state.player.x;
              let dz = prop.z - state.player.z;
              let camX = dx * cosA - dz * sinA;
              let camZ = dx * sinA + dz * cosA;

              if (prop.type === "glider") {
                camX += Math.cos(state.time * 0.0011 + prop.phase) * 1.9;
              }

              if (camZ <= CONFIG.nearClip || camZ >= CONFIG.renderDistance) continue;
              if (Math.abs(camX) > camZ * frustum * 1.32) continue;

              const meta = SPRITES[prop.type];
              const scale = (state.focal / camZ) * meta.size * prop.scale * 0.012;
              if (scale <= 0.012) continue;

              const screenX = state.centerX + (camX * state.focal) / camZ;
              const lift = prop.type === "glider" ? 2.4 + Math.sin(state.time * 0.0016 + prop.phase) * 0.4 : 0;
              const baseY = state.horizonY + ((CONFIG.cameraHeight - lift) * state.focal) / camZ;

              if (screenX < -160 || screenX > state.width + 160 || baseY > state.height + 260) continue;

              visible.push({
                prop,
                meta,
                screenX,
                baseY,
                camZ,
                scale
              });
            }
          }
        }

        visible.sort((a, b) => b.camZ - a.camZ);

        if (visible.length > CONFIG.maxSprites) {
          visible.splice(0, visible.length - CONFIG.maxSprites);
        }

        for (let i = 0; i < spritePool.length; i += 1) {
          const slot = spritePool[i];
          const item = visible[i];

          if (!item) {
            slot.group.setAttribute("opacity", "0");
            continue;
          }

          const fade = clamp(1 - (item.camZ / CONFIG.renderDistance) * 0.72, 0.16, 1);
          const sway = Math.sin(state.time * 0.0012 * item.meta.swaySpeed + item.prop.phase) * item.meta.sway;

          slot.group.setAttribute(
            "transform",
            `translate(${item.screenX.toFixed(2)} ${item.baseY.toFixed(2)}) scale(${item.scale.toFixed(4)})`
          );
          slot.group.setAttribute("opacity", fade.toFixed(3));
          slot.use.setAttribute("href", item.meta.id);
          slot.use.setAttributeNS("http://www.w3.org/1999/xlink", "href", item.meta.id);

          if (item.prop.type === "glider") {
            slot.shadow.setAttribute("opacity", "0");
            slot.body.setAttribute("transform", `scale(${item.prop.flip} 1) rotate(${sway.toFixed(2)} 0 0)`);
          } else {
            slot.shadow.setAttribute("opacity", "1");
            slot.shadow.setAttribute("cx", "0");
            slot.shadow.setAttribute("cy", "5");
            slot.shadow.setAttribute("rx", (item.meta.shadowRx * item.prop.scale).toFixed(2));
            slot.shadow.setAttribute("ry", (item.meta.shadowRy * item.prop.scale).toFixed(2));
            slot.body.setAttribute("transform", `scale(${item.prop.flip} 1) rotate(${sway.toFixed(2)} 0 0)`);
          }
        }

        const statusBucket = Math.floor(state.time / 1000);
        if (statusBucket !== state.lastStatusBucket) {
          state.lastStatusBucket = statusBucket;
          const cardinal = ["Northglass", "Sunward", "Emberglow", "Mistwake"];
          const index = Math.round((state.player.headingDisplay / (Math.PI * 2)) * 4) % 4;
          statusText.textContent = `${cardinal[index]} heading • ${Math.abs(state.player.speed).toFixed(1)} drift • prism forest endless`;
        }

        const pruneBucket = Math.floor(state.time / 6000);
        if (pruneBucket !== state.lastPruneBucket) {
          state.lastPruneBucket = pruneBucket;
          pruneCache(playerCellX, playerCellZ);
        }
      }

      function frame(now) {
        const dt = state.lastFrame ? Math.min((now - state.lastFrame) / 1000, 0.034) : 1 / 60;
        state.lastFrame = now;

        update(dt, now);
        render();
        requestAnimationFrame(frame);
      }

      buildBackground();
      buildSpritePool();
      installInput();
      resize();
      window.addEventListener("resize", resize);
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
